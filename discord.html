<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IswoxX | Discord & Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { background-color: #0c0c0c; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .nav-blur { background: rgba(12, 12, 12, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .product-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; transition: 0.3s; }
        .product-card:hover { border-color: #5865F2; }
        .buy-button { background: #5865F2; color: white; font-weight: 700; padding: 10px; width: 100%; border-radius: 10px; text-align: center; display: inline-block; }
    </style>
</head>
<body>
    <nav class="nav-blur sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold tracking-tighter italic">ISWOX<span class="text-violet-500">X</span></a>
            <div class="flex gap-8 items-center text-sm">
                <a href="index.html" class="text-gray-400">Accueil</a>
                <a href="discord-page.html" class="text-white">Discord</a>
                <a href="exchange.html" class="text-gray-400">Exchange</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <h1 class="text-4xl font-extrabold mb-12">Discord & Gaming</h1>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- NITRO -->
            <div class="product-card p-6 flex flex-col">
                <h3 class="font-bold text-lg mb-1">Nitro Boost</h3>
                <p class="text-gray-500 text-xs mb-6">1 Mois Full Access.</p>
                <div class="mt-auto"><div class="text-xl font-extrabold mb-4">2,60€</div><a href="https://discord.gg/3qd3ptx8" class="buy-button">Récupérer</a></div>
            </div>
            <!-- ROBUX -->
            <div class="product-card p-6 flex flex-col">
                <h3 class="font-bold text-lg mb-1">1000 Robux</h3>
                <p class="text-gray-500 text-xs mb-6">Transfert rapide.</p>
                <div class="mt-auto"><div class="text-xl font-extrabold mb-4">3,90€</div><a href="https://discord.gg/3qd3ptx8" class="buy-button">Récupérer</a></div>
            </div>
            <!-- AGED -->
            <div class="product-card p-6 flex flex-col">
                <h3 class="font-bold text-lg mb-1">Aged Account (2017)</h3>
                <p class="text-gray-500 text-xs mb-6">Compte Discord ancien.</p>
                <div class="mt-auto"><div class="text-xl font-extrabold mb-4">2,70€</div><a href="https://discord.gg/3qd3ptx8" class="buy-button">Récupérer</a></div>
            </div>
        </div>
    </main>
</body>
</html>
